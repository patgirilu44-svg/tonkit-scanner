name: TonKit Scanner Pipeline

on:
  push:
    branches: [main]

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

jobs:

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx jest --ci --forceExit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Next.js build check
        run: npx next build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LEMONSQUEEZY_API_KEY: ${{ secrets.LEMONSQUEEZY_API_KEY }}
          LS_STORE_ID: ${{ secrets.LS_STORE_ID }}
          LS_VARIANT_ID: ${{ secrets.LS_VARIANT_ID }}
          LS_WEBHOOK_SECRET: ${{ secrets.LS_WEBHOOK_SECRET }}
          SCAN_SALT: ${{ secrets.SCAN_SALT }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    needs: build-and-test
    outputs:
      review_passed: ${{ steps.review.outputs.passed }}
      review_issues: ${{ steps.review.outputs.issues }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get diff
        id: diff
        run: |
          DIFF=$(git diff HEAD~1 HEAD -- '*.ts' '*.tsx' '*.js' '*.mjs' | head -c 15000)
          printf 'diff<<DIFF_EOF\n%s\nDIFF_EOF\n' "$DIFF" >> "$GITHUB_OUTPUT"

      - name: Run AI review
        id: review
        run: python3 scripts/ci-review.py
        env:
          DIFF: ${{ steps.diff.outputs.diff }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: ai-review
    if: needs.ai-review.outputs.review_passed == 'true'

    steps:
      - name: Trigger Vercel deploy hook
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          echo "Vercel hook response: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "201" ] && [ "$HTTP_STATUS" != "200" ]; then
            echo "Deploy hook failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Wait for Vercel build
        run: sleep 45

      - name: Verify deployment health
        run: |
          APP_URL="${{ secrets.NEXT_PUBLIC_APP_URL }}"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/api/health")
          echo "Health check: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check FAILED — check Vercel dashboard for build errors"
            exit 1
          fi
          echo "Deployment verified healthy"

  trigger-fix:
    name: Trigger Fix Agent
    runs-on: ubuntu-latest
    needs: ai-review
    if: needs.ai-review.outputs.review_passed == 'false'

    steps:
      - name: Check fix cycle count
        id: retry-check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          FIX_COUNT=$(echo "$COMMIT_MSG" | grep -o '\[review-fix\]' | wc -l || echo 0)
          echo "fix_count=$FIX_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$FIX_COUNT" -ge 3 ]; then
            echo "max_exceeded=true" >> "$GITHUB_OUTPUT"
          else
            echo "max_exceeded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail on max cycles exceeded
        if: steps.retry-check.outputs.max_exceeded == 'true'
        run: |
          echo "MAX FIX CYCLES REACHED. Human decision required."
          echo "Check /status dashboard for details."
          exit 1

      - name: SSH and trigger fix agent
        if: steps.retry-check.outputs.max_exceeded == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 300s
          envs: REVIEW_ISSUES
          script: |
            echo "$REVIEW_ISSUES" > /tmp/review_issues.json
            chmod +x ~/tonkit/scripts/fix-agent.sh
            ~/tonkit/scripts/fix-agent.sh
        env:
          REVIEW_ISSUES: ${{ needs.ai-review.outputs.review_issues }}


  smoke-test:
    name: End-to-End Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: success() && !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Vercel deployment
        run: sleep 30

      - name: Smoke test scan endpoint
        env:
          APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: |
          if [ ! -f fixtures/tact/require-placement/vulnerable.tact ]; then
            echo "No fixtures yet - skipping smoke test"
            exit 0
          fi
          
          PAYLOAD=$(jq -n --arg code "$(cat fixtures/tact/require-placement/vulnerable.tact)" '{contractCode: $code, language: "tact"}')
          
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" -X POST "$APP_URL/api/scan" -H "Content-Type: application/json" -d "$PAYLOAD")
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Smoke test FAILED: HTTP $HTTP_CODE"
            cat /tmp/response.json
            exit 1
          fi
          
          REPORT_ID=$(jq -r '.reportId // empty' /tmp/response.json)
          if [ -z "$REPORT_ID" ]; then
            echo "Smoke test FAILED: no reportId"
            cat /tmp/response.json
            exit 1
          fi
          
          echo "Smoke test PASSED: reportId=$REPORT_ID"
      
      - name: Health check
        env:
          APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: |
          curl -sf "$APP_URL/api/health" || exit 1
          echo "Health check PASSED"

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build-and-test, ai-review, deploy, trigger-fix, smoke-test]
    if: failure() && !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Send Telegram alert
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            MSG="⚠️ TonKit Pipeline FAILED%0ACommit: ${{ github.sha }}%0AMessage: ${{ github.event.head_commit.message }}%0ACheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${MSG}" > /dev/null
            echo "Telegram alert sent"
          else
            echo "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set — skipping alert"
          fi
